name: Daily Soundcloud Scrape

on:
  workflow_dispatch:
    inputs:
      reset:
        description: 'Start fresh (rescrape all tracks)'
        required: false
        type: boolean
        default: false
  schedule:
    - cron: '0 16 * * *'  # Daily at 11am EST (16:00 UTC)

jobs:
  scrape:
    runs-on: self-hosted
    timeout-minutes: 240  # 4 hours

    steps:
      - uses: actions/checkout@v4

      - name: Run SoundCloud scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SOUNDCLOUD_USER_ID: ${{ secrets.SOUNDCLOUD_USER_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          SOUNDCLOUD_COOKIES: ${{ secrets.SOUNDCLOUD_COOKIES }}
        run: |
          cd scraper
          if [ "${{ inputs.reset }}" = "true" ]; then
            /Users/michaelcahana/local_storage/repos/nts-explorer/scraper/venv/bin/python3 scraper.py --reset
          else
            /Users/michaelcahana/local_storage/repos/nts-explorer/scraper/venv/bin/python3 scraper.py
          fi
